<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Web Design Portfolio</title>
  <script>document.documentElement.classList.add("js");</script>
  <link rel="stylesheet" href="../style/main.css">
</head>
<body>
  <main class="portfolio is-booting">
    <div class="portfolio__bg" aria-hidden="true">
      <div class="bg-img bg-flower--large" data-depth="0.62">
        <img src="../assets/images/flower-large.png" alt="">
      </div>
      <div class="bg-img bg-flower--small-left" data-depth="0.86" data-drift="reverse">
        <img src="../assets/images/flower-small-left.png" alt="">
      </div>
      <div class="bg-img bg-flower--small-top" data-depth="1.05">
        <img src="../assets/images/flower-small-top.png" alt="">
      </div>
      <div class="bg-img bg-flower--hero" data-depth="0.74">
        <img src="../assets/images/flower-hero.png" alt="">
      </div>
    </div>
    <section class="section work" id="work">
      <h2 class="section-title title-small" data-reveal="title">태양광 모니터링 시스템</h2>      
      <ul class="concept-list">
        <li class="concept-item">
          <p class="concept-item__title">concept</p>
          <div class="concept-item__content">
            <p class="concept-item__headline">
              운영 현황을 실시간으로 모니터링하고, 발전량과 설비 상태를 직관적으로 확인할 수 있는 스마트 에너지 관리 대시보드
            </p>
            <p class="concept-item__description">
              지도 기반의 시각화와 카드형 레이아웃을 적용하여 발전소 분포와 주요 운영 데이터를 한눈에 파악할 수 있도록 설계하였으며, 사용자 중심의 정보 구조를 통해 효율적인 모니터링 환경을 제공합니다.
            </p>
          </div>
        </li>      
        <li class="concept-item">
          <p class="concept-item__title">color</p>
          <div class="concept-item__color">
            <span style="background-color:#009A80;"></span>
            <span style="background-color:#FEAF27;"></span>
            <span style="background-color:#53FFE2;"></span>
          </div>
        </li>
      </ul>      
      <div class="portfolio__img">
        <img src="../assets/images/tem_18/img01.png" alt="">
      </div>
    </section>
    <a href="../index.html" class="btn-close">
      <img src="../assets/images/close.svg" alt="닫기">
    </a>
    </main>
    <script src="../js/portfolio-bg.js"></script>
</body>

</html>
