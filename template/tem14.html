<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Web Design Portfolio</title>
  <script>document.documentElement.classList.add("js");</script>
  <link rel="stylesheet" href="../style/main.css">
</head>
<body>
  <main class="portfolio is-booting">
    <div class="portfolio__bg" aria-hidden="true">

        <img src="../assets/images/flower-small-left.png" alt="">
      </div>
      <div class="bg-img bg-flower--small-top" data-depth="1.05">

          <div class="tab-panel active">      
            <img src="../assets/images/tem_14/img01.jpg" alt="">

          <div class="tab-panel">
            <img src="../assets/images/tem_14/img02.jpg" alt="">
          </div>      
          <div class="tab-panel">
            <img src="../assets/images/tem_14/img03.jpg" alt="">

        </div>

    <a href="../index.html" class="btn-close">

    <script src="../js/portfolio-bg.js"></script>
    <script src="../js/portfolio-template.js"></script>

</html>
